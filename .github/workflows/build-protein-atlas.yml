name: Build protein atlas index

on:
  push:
    branches:
      - agent/protein-universe
    paths:
      - scripts/build-atlas.mjs
      - .github/workflows/build-protein-atlas.yml
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum reviewed UniProt records (0 = complete query)"
        required: true
        default: "0"
      shards:
        description: "Number of progressive data shards"
        required: true
        default: "128"

jobs:
  build-atlas:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build reviewed UniProt atlas
        run: node scripts/build-atlas.mjs --limit=${{ inputs.limit || '0' }} --shards=${{ inputs.shards || '128' }} --out=generated-atlas
      - name: Record artifact size
        run: |
          du -sh generated-atlas
          cat generated-atlas/BUILD_REPORT.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: helicase-protein-atlas-${{ github.run_id }}
          path: generated-atlas
          compression-level: 9
          retention-days: 14

  publish-browser-atlas:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/protein-universe
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build measured browser delivery profile
        run: node scripts/build-atlas.mjs --limit=75000 --shards=64 --out=public/data/atlas
      - name: Record live payload size
        run: |
          du -sh public/data/atlas
          cat public/data/atlas/BUILD_REPORT.json >> "$GITHUB_STEP_SUMMARY"
      - name: Commit browser atlas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/atlas
          git diff --cached --quiet || git commit -m "Publish 75k-protein browser atlas"
          git push origin HEAD:agent/protein-universe
